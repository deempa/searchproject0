<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Advanced Search</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="links">
            <a href="/index.html">Back To Google Search</a>
        </div>
        <div id="search">
            <a href="https://www.google.com"><img src="/images/googlelogo_color_272x92dp.png" alt="Google Logo" id="logo"></a>
            <form action="https://google.com/search" target="_blank">
                <label for="asq">all these words:</label>
                <input type="text" name="as_q" id="asq">
                <label for="asepq">this exact word or phrase:</label>
                <input type="text" name="as_epq" id="asepq">
                <label for="asoq">any of these words:</label>
                <input type="text" name="as_oq" id="asoq">
                <label for="aseq">none of these words:</label>
                <input type="text" name="as_eq" id="aseq">
                <input type="submit" value="Google Advanced Search">
            </form>
        </div>
    </body>
</html>
