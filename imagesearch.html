<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Image Search</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="links">
            <a href="/index.html">Back To Google Search</a>
        </div>
        <div id="search">
            <a href="https://www.google.com"><img src="/images/googlelogo_color_272x92dp.png" alt="Google Logo" id="logo"></a>
            <form action="https://google.com/search" target="_blank">
                <input type="text" name="q">
                <input type="hidden" name="tbm" value="isch">
                <input type="submit" value="Google Image Search">
            </form>
        </div>
    </body>
</html>
